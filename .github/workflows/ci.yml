name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Audit root dependencies
        run: bun audit
      - name: Typecheck core
        run: bun run typecheck
      - name: Test core and cached artifacts
        run: bun test
      - name: Verify ingest runs offline from the committed RxNav cache
        run: bun run test:hermetic
      - name: Verify bundled data integrity
        run: bun run data:health
      - name: Run credential-free demo
        run: bun run demo:cached > /dev/null
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Audit web dependencies
        working-directory: web
        run: bun audit
      - name: Typecheck web
        working-directory: web
        run: bunx tsc --noEmit
      - name: Lint web
        working-directory: web
        run: bun run lint
      - name: Build web
        working-directory: web
        run: bun run build
